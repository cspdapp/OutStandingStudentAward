<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบประเมินนักศึกษาดีเด่น</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* รีเซ็ตค่าขอบและกำหนดให้เต็มจอ 100% */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* ป้องกันแถบ Scrollbar ซ้อนกัน 2 ชั้น */
      background-color: #EBEFEE; /* สีพื้นหลังตามธีม Amber Walnut */
      font-family: 'Sarabun', sans-serif;
    }

    /* ตกแต่ง Iframe ให้ไร้ขอบและเต็มจอ */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ตกแต่งหน้าต่าง Loading */
    #loader-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #EBEFEE;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    /* Animation วงแหวนหมุน (สีส้ม Terracotta) */
    .spinner {
      border: 4px solid rgba(204, 180, 153, 0.4); /* สีเบจ */
      border-top: 4px solid #BB6C43; /* สีส้มเข้ม */
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #4A413C; /* สีน้ำตาลเข้ม */
      font-weight: 600;
      font-size: 16px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
  </style>
</head>
<body>

  <div id="loader-container">
    <div class="spinner"></div>
    <div class="loading-text">กำลังเชื่อมต่อระบบประเมินนักศึกษาดีเด่น...</div>
  </div>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbzvzzUgT_A9aZa9SaXzXyp1Plkq88zsoMRCPOb6koxGMAhjcdO4WNtFkuD0G5MC8qQq/exec" 
    title="ระบบประเมินนักศึกษาดีเด่น"
    onload="document.getElementById('loader-container').style.opacity = '0'; setTimeout(() => document.getElementById('loader-container').style.display = 'none', 500);"
    allowfullscreen>
  </iframe>

</body>
</html>
